services:
  redis:
    image: redis:7-alpine
    container_name: security_redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    volumes:
      - redis_data:/data

  mysql:
    image: mysql:8.0
    container_name: security_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password_here
      MYSQL_DATABASE: security_bot
      MYSQL_USER: security_user
      MYSQL_PASSWORD: password_here
    ports:
      - "3307:3306"
    restart: unless-stopped
    volumes:
      - mysql_data:/var/lib/mysql
      - ../scripts/init_mysql.sql:/docker-entrypoint-initdb.d/init_mysql.sql

  app-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: security_api
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_HOST=redis
      - MYSQL_HOST=mysql
      - MYSQL_USER=security_user
      - MYSQL_PASSWORD=password_here
      - MYSQL_DB=security_bot
      - MOCK_MODE=false
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - mysql
    restart: unless-stopped

  bot-monitor:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: security_monitor
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_HOST=redis
      - MYSQL_HOST=mysql
      - MYSQL_USER=security_user
      - MYSQL_PASSWORD=password_here
      - MYSQL_DB=security_bot
      - MOCK_MODE=false
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - NGINX_LOG_PATH=/var/log/nginx/access.log
    volumes:
      - /var/log/nginx:/var/log/nginx:ro
    cap_add:
      - NET_ADMIN
    # Note: Removed network_mode: host as per your latest change
    depends_on:
      - redis
      - mysql
    command: python workers/monitor.py
    restart: unless-stopped

volumes:
  redis_data:
  mysql_data:
