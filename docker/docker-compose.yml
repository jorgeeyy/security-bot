services:
  redis:
    image: redis:7-alpine
    container_name: security_redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    volumes:
      - redis_data:/data

  mysql:
    image: mysql:8.0
    container_name: security_mysql
    env_file: ../.env
    environment:
      # Use the same variables from your .env for the database itself
      MYSQL_ROOT_PASSWORD: root_password_here
      MYSQL_DATABASE: ${MYSQL_DB}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3307:3306"
    restart: unless-stopped
    volumes:
      - mysql_data:/var/lib/mysql
      - ../scripts/init_mysql.sql:/docker-entrypoint-initdb.d/init_mysql.sql

  app-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: security_api
    env_file: ../.env
    environment:
      - REDIS_HOST=redis
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - mysql
    restart: unless-stopped

  bot-monitor:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: security_monitor
    env_file: ../.env
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_HOST=redis
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - NGINX_LOG_PATH=/var/log/nginx/access.log
      - SSH_LOG_PATH=/var/log/auth.log
    volumes:
      - /var/log/nginx:/var/log/nginx:ro
      - /var/log/auth.log:/var/log/auth.log:ro
    cap_add:
      - NET_ADMIN
    depends_on:
      - redis
      - mysql
    command: python workers/monitor.py
    restart: unless-stopped

volumes:
  redis_data:
  mysql_data:
